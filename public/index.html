<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Magasin TGE</title>
  <link rel="stylesheet" href="/design.css">
  <style>
    body.sse-offline::after {
      content: "Connexion perdue...";
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      background: var(--color-danger);
      color: #fff;
      text-align: center;
      font-size: var(--font-size-xs);
      padding: 0.2rem;
      z-index: 200;
    }

    header {
      background: var(--color-primary);
      color: #fff;
      padding: 0 1.25rem;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    header .spacer { flex: 1; }

    .header-btn {
      padding: 0.25rem 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.7rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .header-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }

    #user-badge {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
    }

    /* ── Search bar (fixed bottom) ── */
    #search-area {
      position: fixed;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 1.2rem);
      max-width: 600px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 28px;
      padding: 0.4rem 0.5rem 0.4rem 0.6rem;
      z-index: 150;
      display: flex;
      gap: 0.4rem;
      align-items: center;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
    }

    #search-bar {
      flex: 1;
      position: relative;
    }

    #search-bar svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: var(--color-text-muted);
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.55rem 2rem 0.55rem 2rem;
      border: none;
      border-radius: 20px;
      background: transparent;
      color: var(--color-text);
      font-size: 1rem;
      outline: none;
    }

    #search-input::placeholder { color: var(--color-text-faint); }

    #search-clear {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 2.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 1.3rem;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
    }

    #search-clear.visible { display: flex; }

    #search-clear:hover { color: var(--color-text); }

    #photo-search-btn {
      background: var(--color-primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      padding: 0.55rem;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    #photo-search-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    #photo-search-btn:hover { background: #2d2d4a; }

    #photo-input { display: none; }

    #photo-status {
      font-size: 0.75rem;
      color: var(--color-accent);
      text-align: center;
      padding: 0.3rem;
      display: none;
    }

    #photo-status.visible { display: block; }

    .page-layout {
      min-height: calc(100vh - 44px);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0.75rem 1rem 7rem;
      transition: padding-right 0.2s;
    }

    /* ── Cart sidebar (desktop) ── */
    #cart-sidebar {
      display: none;
      width: 300px;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      padding: 1rem;
      position: fixed;
      right: 0;
      top: 44px;
      height: calc(100vh - 44px);
      overflow-y: auto;
    }

    #cart-sidebar.has-items { display: block; }

    /* Offset body when sidebar is open so content stays centered */
    @media (min-width: 769px) {
      .page-layout.cart-open {
        padding-right: 300px;
      }
    }

    #cart-sidebar h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #cart-sidebar h3 svg { width: 18px; height: 18px; fill: #333; }

    #cart-sidebar .cart-count-label {
      font-weight: 400;
      color: var(--color-text-muted);
      font-size: 0.8rem;
    }

    #cart-sidebar-items { }

    #cart-sidebar .submit-btn {
      width: 100%;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      background: var(--color-success);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.75rem;
    }

    #cart-sidebar .submit-btn:hover { background: #1b5e20; }

    @media (max-width: 768px) {
      #cart-sidebar { display: none !important; }
    }

    #result-count {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 0.75rem;
    }

    #empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: #bbb;
    }

    #empty-state p { font-size: 1rem; }

    #empty-state .hint {
      font-size: 0.8rem;
      margin-top: 0.4rem;
      color: #ccc;
    }

    /* Results */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.5rem;
    }

    .item-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 0.85rem 1.1rem;
    }

    .item-card:hover { border-color: #bbb; }

    .item-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.15rem;
    }

    .item-card .article-no {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-accent);
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .item-card .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--color-input-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 1.4rem;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .item-card .add-btn:hover { border-color: var(--color-success); color: var(--color-success); }

    .card-qty-control {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }

    .card-qty-control .qty-minus,
    .card-qty-control .qty-plus {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--color-input-border);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .card-qty-control .qty-minus:hover { border-color: var(--color-danger); color: var(--color-danger); }
    .card-qty-control .qty-plus:hover { border-color: var(--color-success); color: var(--color-success); }

    .card-qty-control .qty-val {
      min-width: 1.5rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .item-card .description {
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .item-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      font-size: 0.7rem;
    }

    .item-card .meta span {
      background: var(--color-input-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      color: var(--color-text-secondary);
    }

    .item-card .meta span strong { color: var(--color-text); }
    .item-card .meta .out-of-stock { color: var(--color-danger); background: var(--color-danger-light); }
    .item-card .meta .out-of-stock strong { color: var(--color-danger); }

    .item-card .item-photo {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      border-radius: 4px;
      margin-bottom: 0.4rem;
      background: var(--color-input-bg);
    }

    .item-card .doc-link {
      font-size: 0.7rem;
      color: var(--color-accent);
      text-decoration: none;
    }

    .item-card .doc-link:hover { text-decoration: underline; }

    /* Cart bar */
    /* ── Cart FAB ── */
    #cart-fab {
      position: fixed;
      bottom: 4.5rem;
      right: 1rem;
      z-index: 160;
      display: none;
    }

    @media (min-width: 769px) {
      #cart-fab { display: none !important; }
    }

    #cart-fab.visible { display: block; }

    #cart-fab-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--color-success);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    #cart-fab-btn svg { width: 24px; height: 24px; fill: #fff; }
    #cart-fab-btn:hover { background: #1b5e20; }

    #cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--color-danger);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Cart modal ── */
    .cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 36px;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--color-border-light);
      height: 52px;
    }

    .cart-item:last-child { border-bottom: none; }

    .cart-item-info {
      overflow: hidden;
    }

    .cart-item-info .cart-item-no {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-accent);
    }

    .cart-item-info .cart-item-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cart-item .qty-control {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .cart-item .qty-btn {
      background: var(--color-input-bg);
      border: none;
      color: var(--color-text);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .cart-item .qty-btn:hover { background: var(--color-border); }

    .cart-item .qty-val {
      font-weight: 600;
      min-width: 1.5rem;
      text-align: center;
    }

    .cart-item .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.4rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      -webkit-tap-highlight-color: transparent;
    }

    .cart-item .remove-btn:hover { color: var(--color-danger); background: var(--color-danger-light); }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--color-surface);
      border-radius: 8px;
      padding: 1.75rem;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .modal h2 {
      font-size: 1.1rem;
      color: var(--color-text);
      margin-bottom: 1rem;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.2rem;
    }

    .modal input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--color-input-border);
      border-radius: 5px;
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 0.85rem;
    }

    .modal input:focus { border-color: var(--color-accent); }

    .modal .order-summary {
      background: var(--color-input-bg);
      border-radius: 5px;
      padding: 0.6rem 0.85rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #555;
      max-height: 140px;
      overflow-y: auto;
    }

    .modal .order-summary .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 0.15rem 0;
    }

    .modal .btn-row {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
    }

    .modal .btn-cancel {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: 1px solid var(--color-input-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .modal .btn-cancel:hover { border-color: var(--color-text-muted); }

    .modal .btn-confirm {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: none;
      background: var(--color-success);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .modal .btn-confirm:hover { background: #1b5e20; }

    .modal .confirmation { text-align: center; }

    .modal .confirmation .order-num {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-success);
      margin: 0.75rem 0;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .modal .confirmation p {
      color: var(--color-text-secondary);
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .modal .btn-danger {
      padding: 0.4rem 0.85rem;
      border-radius: 5px;
      border: 1px solid var(--color-input-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 0.8rem;
    }

    .modal .btn-danger:hover { border-color: var(--color-danger); color: var(--color-danger); }

    /* Order tracker */
    #my-orders { display: none; margin-bottom: 1rem; }
    #my-orders.visible { display: block; }

    .my-order {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 0.65rem 1rem;
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
    }

    .my-order.faded { opacity: 0.7; }

    .my-order .order-num {
      font-weight: 700;
      color: var(--color-text);
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .my-order .order-status {
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .my-order .order-status.pending { background: var(--color-surface)3cd; color: var(--color-warning-text); }
    .my-order .order-status.preparing { background: var(--color-info-bg); color: var(--color-info-text); }
    .my-order .order-status.ready { background: var(--color-success-light); color: #155724; animation: pulse-bg 1.5s ease infinite; }

    @keyframes pulse-bg {
      0%, 100% { background: var(--color-success-light); }
      50% { background: #a3d9a5; }
    }

    .my-order .order-detail { flex: 1; color: var(--color-text-muted); font-size: 0.8rem; }

    .my-order .cancel-link {
      background: var(--color-danger-light);
      border: 1px solid var(--color-danger-border);
      border-radius: 12px;
      color: var(--color-danger);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.7rem;
      text-decoration: none;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .my-order .cancel-link:hover { background: #f8bbd0; }

    .ready-instructions {
      background: var(--color-success-light);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-sm);
      color: #155724;
      margin-top: var(--space-sm);
      line-height: 1.4;
    }

    .my-order .dismiss-btn {
      background: var(--color-success);
      border: none;
      border-radius: var(--radius-pill);
      color: #fff;
      cursor: pointer;
      font-size: var(--font-size-sm);
      font-weight: 600;
      padding: var(--space-sm) var(--space-lg);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .my-order .dismiss-btn:hover { background: #1b5e20; }

    .my-order-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
    }

    .my-order.faded { opacity: 0.5; }

    .my-order-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.75rem;
      cursor: pointer;
    }

    .my-order-header .order-detail {
      flex-basis: 100%;
      order: 10;
    }

    .my-order-header .expand-arrow {
      color: var(--color-text-faint);
      font-size: 0.7rem;
      margin-left: auto;
    }

    .my-order-actions {
      display: flex;
      gap: 0.4rem;
      margin-left: auto;
    }

    .my-order-items {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--color-border);
    }

    .order-item-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
      padding: 0.25rem 0;
      font-size: 0.8rem;
      align-items: baseline;
    }

    .order-item-qty { font-weight: 700; color: var(--color-text); min-width: 1.5rem; }
    .order-item-no { font-family: 'SF Mono', 'Consolas', monospace; color: var(--color-accent); font-size: 0.75rem; }
    .order-item-desc { color: var(--color-text-secondary); flex: 1; min-width: 120px; }
    .order-item-loc { color: var(--color-text-muted); font-size: 0.7rem; }

    .my-order .reorder-btn {
      background: none;
      border: 1px solid var(--color-input-border);
      border-radius: 4px;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
    }

    .my-order .reorder-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

    #notif-btn {
      width: 100%;
      padding: 0.5rem;
      border-radius: 5px;
      border: 1px solid var(--color-input-border);
      background: var(--color-input-bg);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
    }

    #notif-btn:hover { border-color: var(--color-text-muted); }

    @media (max-width: 640px) {
      header { padding: 0 0.75rem; height: 48px; gap: 0.5rem; }
      header h1 { display: none; }
      main { padding: 0.75rem 0.75rem 9rem; }
      #results { grid-template-columns: 1fr; }

      .my-order { padding: 0.5rem 0.75rem; }
      .my-order-header { gap: 0.3rem 0.5rem; }
      .my-order-header .order-detail { font-size: 0.7rem; }
      .order-item-row { font-size: 0.75rem; }
      .order-item-desc { min-width: 80px; }
    }
  </style>
</head>
<body>
  <div class="modal-overlay open" id="da-modal">
    <div class="modal">
      <h2>Magasin TGE</h2>
      <p style="color:#888; margin-bottom:1rem; font-size:0.85rem;">Identifiez-vous pour passer des commandes.</p>
      <label for="da-input">Num&#233;ro de DA</label>
      <input type="text" id="da-input" placeholder="1234567" autocomplete="off">
      <label for="name-input">Nom</label>
      <input type="text" id="name-input" placeholder="Jean Tremblay" autocomplete="off">
      <div style="margin-bottom:0.85rem;">
        <button id="notif-btn">Activer les notifications</button>
      </div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn-confirm" id="da-confirm">Continuer</button>
      </div>
    </div>
  </div>

  <header>
    <span id="user-badge"></span>
    <div class="spacer"></div>
    <button id="history-btn" class="header-btn" style="display:none;" title="Mes commandes">

      <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;vertical-align:middle;margin-right:2px;"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Commandes
    </button>
    <button id="student-logout" class="header-btn" style="display:none;" title="Changer de compte">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;vertical-align:middle;"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
    </button>
  </header>

  <!-- Search bar fixed at bottom -->
  <div id="search-area">
    <div id="search-bar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un article..." autocomplete="off">
      <button id="search-clear">&times;</button>
    </div>
    <button id="photo-search-btn" title="Rechercher par photo">
      <svg viewBox="0 0 24 24"><path d="M12 12m-3.2 0a3.2 3.2 0 1 0 6.4 0 3.2 3.2 0 1 0-6.4 0M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
    </button>
    <input type="file" id="photo-input" accept="image/*" capture="environment">
  </div>

  <div class="page-layout">
    <main>
      <div id="photo-status"></div>
      <div id="my-orders"></div>
      <div id="empty-state">
        <p>Recherchez un article dans l'inventaire</p>
        <div class="hint">Num&#233;ro d'article, composant, description...</div>
      </div>
      <div id="result-count" style="display:none;"></div>
      <div id="results"></div>
    </main>

    <aside id="cart-sidebar">
      <h3>
        <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        Panier <span class="cart-count-label" id="cart-sidebar-count"></span>
      </h3>
      <div id="cart-sidebar-items"></div>
      <button class="submit-btn" id="submit-order-sidebar">Soumettre la demande</button>
    </aside>
  </div>

  <!-- History modal -->
  <div class="modal-overlay" id="history-modal" style="align-items:flex-start;padding-top:3rem;">
    <div class="modal" style="max-width:500px;max-height:80vh;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
        <h2 style="margin:0;">Commandes</h2>
        <button class="btn-cancel" id="history-close" style="padding:0.3rem 0.7rem;">&times;</button>
      </div>
      <input type="text" id="history-search" class="input" placeholder="Rechercher une commande..." style="margin-bottom:0.5rem;font-size:var(--font-size-sm);">
      <div id="my-history" style="flex:1;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- Cart FAB -->
  <div id="cart-fab">
    <button id="cart-fab-btn">
      <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span id="cart-badge">0</span>
    </button>
  </div>

  <!-- Cart modal -->
  <div class="modal-overlay" id="cart-modal" style="align-items:flex-start;padding-top:3rem;">
    <div class="modal" style="max-width:440px;max-height:80vh;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
        <h2 style="margin:0;">Panier</h2>
        <button class="btn-cancel" id="cart-modal-close" style="padding:0.3rem 0.7rem;">&times;</button>
      </div>
      <div id="cart-items" style="flex:1;overflow-y:auto;"></div>
      <button class="btn-confirm" id="submit-order-btn" style="width:100%;margin-top:0.75rem;padding:0.7rem;">Soumettre la demande</button>
    </div>
  </div>

  <div class="modal-overlay" id="submit-modal">
    <div class="modal">
      <div id="modal-form">
        <h2>Confirmer la demande</h2>
        <div class="order-summary" id="modal-summary"></div>
        <div class="btn-row">
          <button class="btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn-confirm" id="modal-confirm">Confirmer</button>
        </div>
      </div>
      <div id="modal-confirmation" style="display:none;">
        <div class="confirmation">
          <h2>Demande envoy&#233;e</h2>
          <div class="order-num" id="order-number-display"></div>
          <p>Pr&#233;sentez ce num&#233;ro au comptoir.<br>On vous appelle quand c'est pr&#234;t.</p>
          <div class="btn-row" style="justify-content:center; gap:0.75rem;">
            <button class="btn-danger" id="cancel-order-btn">Annuler</button>
            <button class="btn-confirm" id="close-confirm-btn">OK</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:340px;text-align:center;">
      <p id="confirm-msg" style="margin-bottom:1.25rem;font-size:0.95rem;color:#333;"></p>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn-cancel" id="confirm-no">Non</button>
        <button class="btn-confirm" id="confirm-yes" style="background:#c62828;">Oui, annuler</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
