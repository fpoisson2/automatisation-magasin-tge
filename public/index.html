<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magasin TGE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #e5e5e5;
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    #search-bar {
      flex: 1;
      max-width: 520px;
      position: relative;
    }

    #search-bar svg {
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: #999;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      border: 1px solid #d1d1d1;
      border-radius: 6px;
      background: #f7f7f7;
      color: #1a1a1a;
      font-size: 0.9rem;
      outline: none;
    }

    #search-input:focus {
      border-color: #0066cc;
      background: #fff;
    }

    #search-input::placeholder { color: #aaa; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #notif-header-btn {
      padding: 0.25rem 0.6rem;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      background: #fff;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      display: none;
    }

    #notif-header-btn:hover { border-color: #0066cc; color: #0066cc; }

    #user-badge {
      font-size: 0.8rem;
      color: #666;
      white-space: nowrap;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 7rem;
    }

    #result-count {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.75rem;
    }

    #empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: #bbb;
    }

    #empty-state p { font-size: 1rem; }

    #empty-state .hint {
      font-size: 0.8rem;
      margin-top: 0.4rem;
      color: #ccc;
    }

    /* Results */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.5rem;
    }

    .item-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
    }

    .item-card:hover { border-color: #bbb; }

    .item-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.15rem;
    }

    .item-card .article-no {
      font-size: 0.85rem;
      font-weight: 700;
      color: #0066cc;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .item-card .add-btn {
      padding: 0.2rem 0.5rem;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      background: #fff;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .item-card .add-btn:hover { border-color: #2e7d32; color: #2e7d32; }

    .item-card .add-btn.added {
      border-color: #2e7d32;
      background: #2e7d32;
      color: #fff;
    }

    .item-card .description {
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .item-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      font-size: 0.7rem;
    }

    .item-card .meta span {
      background: #f5f5f5;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      color: #666;
    }

    .item-card .meta span strong { color: #333; }
    .item-card .meta .out-of-stock { color: #c62828; background: #fce4ec; }
    .item-card .meta .out-of-stock strong { color: #c62828; }

    /* Cart bar */
    #cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 2px solid #e5e5e5;
      padding: 0.6rem 1.25rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      z-index: 150;
    }

    #cart-bar.visible { display: flex; }

    #cart-bar .cart-icon {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #333;
    }

    #cart-bar .cart-icon svg { width: 20px; height: 20px; fill: #333; }

    #cart-bar .cart-items {
      flex: 1;
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
    }

    .cart-chip {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      color: #333;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .cart-chip .qty-control {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }

    .cart-chip .qty-btn {
      background: #e0e0e0;
      border: none;
      color: #333;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-chip .qty-btn:hover { background: #ccc; }

    .cart-chip .remove-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
    }

    .cart-chip .remove-btn:hover { color: #c62828; }

    #cart-bar .submit-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 5px;
      border: none;
      background: #2e7d32;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #cart-bar .submit-btn:hover { background: #1b5e20; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 1.75rem;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .modal h2 {
      font-size: 1.1rem;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.2rem;
    }

    .modal input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d1d1;
      border-radius: 5px;
      background: #fff;
      color: #1a1a1a;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 0.85rem;
    }

    .modal input:focus { border-color: #0066cc; }

    .modal .order-summary {
      background: #f7f7f7;
      border-radius: 5px;
      padding: 0.6rem 0.85rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #555;
      max-height: 140px;
      overflow-y: auto;
    }

    .modal .order-summary .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 0.15rem 0;
    }

    .modal .btn-row {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
    }

    .modal .btn-cancel {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: 1px solid #d1d1d1;
      background: #fff;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .modal .btn-cancel:hover { border-color: #999; }

    .modal .btn-confirm {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: none;
      background: #2e7d32;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .modal .btn-confirm:hover { background: #1b5e20; }

    .modal .confirmation { text-align: center; }

    .modal .confirmation .order-num {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2e7d32;
      margin: 0.75rem 0;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .modal .confirmation p {
      color: #666;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .modal .btn-danger {
      padding: 0.4rem 0.85rem;
      border-radius: 5px;
      border: 1px solid #d1d1d1;
      background: #fff;
      color: #666;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .modal .btn-danger:hover { border-color: #c62828; color: #c62828; }

    /* Order tracker */
    #my-orders { display: none; margin-bottom: 1rem; }
    #my-orders.visible { display: block; }

    .my-order {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 0.65rem 1rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
    }

    .my-order .order-num {
      font-weight: 700;
      color: #1a1a1a;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .my-order .order-status {
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .my-order .order-status.pending { background: #fff3cd; color: #856404; }
    .my-order .order-status.preparing { background: #cce5ff; color: #004085; }
    .my-order .order-status.ready { background: #d4edda; color: #155724; animation: pulse-bg 1.5s ease infinite; }

    @keyframes pulse-bg {
      0%, 100% { background: #d4edda; }
      50% { background: #a3d9a5; }
    }

    .my-order .order-detail { flex: 1; color: #888; font-size: 0.8rem; }

    .my-order .cancel-link {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 0.75rem;
      text-decoration: underline;
    }

    .my-order .cancel-link:hover { color: #c62828; }

    #notif-btn {
      width: 100%;
      padding: 0.5rem;
      border-radius: 5px;
      border: 1px solid #d1d1d1;
      background: #f7f7f7;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #notif-btn:hover { border-color: #999; }

    @media (max-width: 640px) {
      header { padding: 0 0.75rem; height: 48px; gap: 0.5rem; }
      main { padding: 0.75rem 0.75rem 7rem; }
      #results { grid-template-columns: 1fr; }
      #cart-bar { padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="modal-overlay open" id="da-modal">
    <div class="modal">
      <h2>Magasin TGE</h2>
      <p style="color:#888; margin-bottom:1rem; font-size:0.85rem;">Identifiez-vous pour passer des commandes.</p>
      <label for="da-input">Num&#233;ro de DA</label>
      <input type="text" id="da-input" placeholder="1234567" autocomplete="off">
      <label for="name-input">Nom</label>
      <input type="text" id="name-input" placeholder="Jean Tremblay" autocomplete="off">
      <div style="margin-bottom:0.85rem;">
        <button id="notif-btn">Activer les notifications</button>
      </div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn-confirm" id="da-confirm">Continuer</button>
      </div>
    </div>
  </div>

  <header>
    <h1>Magasin TGE</h1>
    <div id="search-bar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un article..." autocomplete="off">
    </div>
    <div class="header-right">
      <button id="notif-header-btn">Activer notifs</button>
      <span id="user-badge"></span>
    </div>
  </header>

  <main>
    <div id="my-orders"></div>
    <div id="empty-state">
      <p>Recherchez un article dans l'inventaire</p>
      <div class="hint">Num&#233;ro d'article, composant, description...</div>
    </div>
    <div id="result-count" style="display:none;"></div>
    <div id="results"></div>
  </main>

  <div id="cart-bar">
    <div class="cart-icon">
      <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span id="cart-count">0</span>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <button class="submit-btn" id="submit-order-btn">Soumettre</button>
  </div>

  <div class="modal-overlay" id="submit-modal">
    <div class="modal">
      <div id="modal-form">
        <h2>Confirmer la demande</h2>
        <div class="order-summary" id="modal-summary"></div>
        <div class="btn-row">
          <button class="btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn-confirm" id="modal-confirm">Confirmer</button>
        </div>
      </div>
      <div id="modal-confirmation" style="display:none;">
        <div class="confirmation">
          <h2>Demande envoy&#233;e</h2>
          <div class="order-num" id="order-number-display"></div>
          <p>Pr&#233;sentez ce num&#233;ro au comptoir.<br>On vous appelle quand c'est pr&#234;t.</p>
          <div class="btn-row" style="justify-content:center; gap:0.75rem;">
            <button class="btn-danger" id="cancel-order-btn">Annuler</button>
            <button class="btn-confirm" id="close-confirm-btn">OK</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
