<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magasin TGE - Statistiques</title>
  <link rel="stylesheet" href="/design.css">
  <style>
    header {
      background: var(--color-primary);
      color: #fff;
      padding: 0 var(--space-xl);
      height: var(--header-height);
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: var(--font-size-lg); font-weight: 700; }
    header .spacer { flex: 1; }
    header a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: var(--font-size-sm); }
    header a:hover { color: #fff; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-xl);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .stat-big {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      text-align: center;
    }

    .stat-big .num {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--color-primary);
    }

    .stat-big .label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: var(--space-xs);
    }

    h2 {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: var(--space-xl) 0 var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--color-border);
    }

    .top-table {
      width: 100%;
      border-collapse: collapse;
    }

    .top-table th {
      text-align: left;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--color-border);
    }

    .top-table td {
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--color-border-light);
    }

    .top-table .article-no {
      font-family: var(--font-mono);
      color: var(--color-accent);
      font-weight: 600;
    }

    .top-table .bar-cell {
      width: 30%;
    }

    .bar {
      height: 8px;
      background: var(--color-accent);
      border-radius: 4px;
      opacity: 0.6;
    }

    .hours-grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
      align-items: end;
      height: 80px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-md) var(--space-sm) var(--space-sm);
    }

    .hour-bar {
      background: var(--color-accent);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      opacity: 0.7;
    }

    .hours-labels {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
      padding: 0 var(--space-sm);
    }

    .hours-labels span {
      text-align: center;
      font-size: 0.55rem;
      color: var(--color-text-faint);
    }
  </style>
</head>
<body>
  <header>
    <h1>Statistiques</h1>
    <div class="spacer"></div>
    <a href="/admin">Commandes</a>
    <a href="/">Inventaire</a>
  </header>

  <main>
    <div class="stats-grid" id="summary"></div>

    <h2>Achalandage par heure</h2>
    <div class="hours-grid" id="hours-chart"></div>
    <div class="hours-labels" id="hours-labels"></div>

    <h2>Articles les plus demand&#233;s</h2>
    <table class="top-table">
      <thead>
        <tr><th>Article</th><th>Description</th><th>Qt&#233;</th><th>Commandes</th><th></th></tr>
      </thead>
      <tbody id="top-articles"></tbody>
    </table>
  </main>

  <script>
    // Force clear old service worker cache
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((r) => r.update());
      });
      caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
    }
  </script>
  <script src="stats.js"></script>
</body>
</html>
