<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Magasin TGE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 340px;
    }

    .login-card h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .login-card p {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 0.85rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.25rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d1d1;
      border-radius: 5px;
      font-size: 0.95rem;
      outline: none;
      color: #1a1a1a;
    }

    .form-group input:focus { border-color: #0066cc; }

    button[type="submit"] {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 5px;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover { background: #333; }
    button[type="submit"]:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      color: #c62828;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      min-height: 1.1em;
    }
  </style>
</head>
<body>
  <form class="login-card" id="login-form">
    <h1>Magasin TGE</h1>
    <p>Administration</p>

    <div class="form-group">
      <label for="username">Utilisateur</label>
      <input type="text" id="username" name="username" required autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>

    <button type="submit">Connexion</button>
    <div class="error-msg" id="error"></div>
  </form>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Connexion...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });

        if (res.ok) {
          window.location.href = "/admin";
        } else {
          errorEl.textContent = "Identifiants invalides.";
        }
      } catch {
        errorEl.textContent = "Erreur de connexion.";
      }

      btn.disabled = false;
      btn.textContent = "Connexion";
    });
  </script>
</body>
</html>
