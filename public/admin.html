<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magasin TGE - Commandes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 2px solid #e5e5e5;
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
    }

    header .spacer { flex: 1; }

    header a {
      color: #666;
      text-decoration: none;
      font-size: 0.8rem;
    }

    header a:hover { color: #0066cc; }

    #logout-btn {
      padding: 0.25rem 0.7rem;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      background: #fff;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
    }

    #logout-btn:hover { border-color: #c62828; color: #c62828; }

    #sound-toggle {
      padding: 0.25rem 0.7rem;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      background: #fff;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
    }

    #sound-toggle.active { border-color: #2e7d32; color: #2e7d32; }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    .stats {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      flex: 1;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 0.85rem;
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.75rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .stat-card .label {
      font-size: 0.7rem;
      color: #888;
      margin-top: 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stat-card.pending .num { color: #e65100; }
    .stat-card.preparing .num { color: #0066cc; }
    .stat-card.ready .num { color: #2e7d32; }

    .section-title {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin: 1.25rem 0 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #e5e5e5;
    }

    .order-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
    }

    .order-card .order-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .order-card .order-num {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .order-card .student-info {
      flex: 1;
      font-size: 0.85rem;
      color: #888;
    }

    .order-card .student-info strong { color: #333; }

    .order-card .order-time {
      font-size: 0.75rem;
      color: #aaa;
    }

    .order-card .order-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.6rem;
    }

    .order-card .order-item-chip {
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      color: #555;
    }

    .order-card .order-item-chip .qty {
      font-weight: 700;
      color: #333;
    }

    .order-card .actions {
      display: flex;
      gap: 0.4rem;
    }

    .order-card .actions button {
      padding: 0.35rem 0.85rem;
      border-radius: 4px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .order-card .actions button:hover { opacity: 0.85; }

    .btn-prepare { background: #0066cc; color: #fff; }
    .btn-ready { background: #2e7d32; color: #fff; }
    .btn-pickup { background: #5e35b1; color: #fff; }

    .btn-cancel-order {
      background: #fff;
      border: 1px solid #d1d1d1 !important;
      color: #888;
    }

    .btn-cancel-order:hover { border-color: #c62828 !important; color: #c62828; }

    .empty-section {
      text-align: center;
      padding: 2.5rem;
      color: #ccc;
      font-size: 0.85rem;
    }

    .status-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-done { background: #e8f5e9; color: #2e7d32; }
    .status-cancelled { background: #fce4ec; color: #c62828; }

    @media (max-width: 640px) {
      header { padding: 0 0.75rem; height: 48px; gap: 0.5rem; }
      main { padding: 0.75rem; }
      .stats { flex-wrap: wrap; }
      .stat-card { min-width: 70px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Commandes</h1>
    <div class="spacer"></div>
    <button id="sound-toggle">Son: OFF</button>
    <a href="/">Inventaire</a>
    <button id="logout-btn">D&#233;connexion</button>
  </header>

  <main>
    <div class="stats">
      <div class="stat-card pending">
        <div class="num" id="stat-pending">0</div>
        <div class="label">En attente</div>
      </div>
      <div class="stat-card preparing">
        <div class="num" id="stat-preparing">0</div>
        <div class="label">En pr&#233;paration</div>
      </div>
      <div class="stat-card ready">
        <div class="num" id="stat-ready">0</div>
        <div class="label">Pr&#234;tes</div>
      </div>
    </div>

    <div id="orders-container"></div>
  </main>

  <script>
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/login";
    });
  </script>
  <script src="admin.js"></script>
</body>
</html>
